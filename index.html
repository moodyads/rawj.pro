<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وكالة روّج | للتسويق الرقمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* الإعدادات الأساسية والألوان بناءً على اللوجو */
        :root {
            --dark-blue: #15162d; /* لون كحلي من اللوجو */
            --purple: #8e2b6b; /* لون موف من اللوجو */
            --light-bg: #f8f9fa;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: var(--dark-blue);
        }
        /* تصميم الـ Header (الرأس) */
        header {
            background-color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .logo img {
            max-height: 80px; /* حجم اللوجو */
        }
        nav a {
            text-decoration: none;
            color: var(--dark-blue);
            margin: 0 15px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        nav a:hover {
            color: var(--purple);
        }
        /* القسم الرئيسي (الواجهة) */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 80px 50px;
            background: linear-gradient(135deg, var(--dark-blue) 0%, #2a1b4d 100%);
            color: white;
        }
        .hero-content {
            width: 50%;
        }
        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .hero h1 span {
            color: #d150a2; /* موف فاتح لإبراز الكلمة */
        }
        .hero p {
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #e0e0e0;
        }
        .cta-button {
            background-color: var(--purple);
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }
        .cta-button:hover {
            background-color: #6a1f4f;
            transform: translateY(-2px);
        }
        /* مكان صورة العميل السعودي */
        .hero-image {
            width: 45%;
            text-align: left;
        }
        .hero-image img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* تجاوب الموقع مع الموبايل */
        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; padding: 40px 20px; }
            .hero-content { width: 100%; margin-bottom: 40px; }
            .hero-image { width: 100%; }
            header { flex-direction: column; padding: 15px; }
            nav { margin-top: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="وكالة روج للتسويق الرقمي">
        </div>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#">خدماتنا</a>
            <a href="#">لماذا نحن؟</a>
            <a href="#">تواصل معنا</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>نحلق بمبيعاتك نحو <span>القمة</span></h1>
            <p>وكالة روّج هي شريكك الاستراتيجي في المملكة العربية السعودية. نقدم حلول تسويقية رقمية مبتكرة لزيادة أرباحك، وبناء هوية بصرية قوية، والوصول لعملائك المستهدفين بدقة.</p>
            <a href="#" class="cta-button">اطلب استشارة مجانية</a>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="رجل أعمال سعودي">
        </div>
    </section>

</body>
</html>
